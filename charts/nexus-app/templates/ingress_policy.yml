apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nexus-app.fullname" . }}-ingress
  labels:
  {{- include "nexus-app.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  rules:
  - http:
      paths:
      - backend:
          service:
            name: '{{ include "nexus-app.fullname" . }}-service'
            port:
              number: 8080
        path: /api
        pathType: Prefix
      - backend:
          service:
            name: '{{ include "nexus-app.fullname" . }}-fe-service'
            port:
              number: 80
        path: /
        pathType: Prefix
